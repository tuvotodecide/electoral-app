appId: com.tuvotodecide
---
# 1. Iniciar sesión usando el flujo existente
- runFlow: ../auth/loginCorrectPin.yaml
# 2. En el Home, deslizar el carrusel para ver el segundo anuncio (Asoblockchain)
- swipe:
    from:
      id: "homeCarouselItem_1"
    direction: LEFT
# 3. Pulsar el botón "Conocer más" del anuncio de Asoblockchain
- extendedWaitUntil:
    visible:
      id: "homeCarouselButton_2"
    timeout: 10000

- tapOn:
    id: "homeCarouselButton_2"

# 4. Esperar a que abra el navegador y hacer 3 scrolls hacia abajo
- waitForAnimationToEnd:
    timeout: 5000

- scroll
- scroll
- scroll

# 5. Regresar a la aplicación
- back
