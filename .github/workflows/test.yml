name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Stub local wira-sdk link
        # package.json depends on "wira-sdk": "link:../wira-sdk", a sibling
        # repo not published/checked out in CI. Tests mock this module via
        # jest.config.js moduleNameMapper, so a placeholder is enough to let
        # pnpm resolve the link without cloning the real wira-sdk repo.
        run: |
          mkdir -p ../wira-sdk
          cat > ../wira-sdk/package.json <<'EOF'
          {
            "name": "wira-sdk",
            "version": "0.0.0",
            "main": "index.js"
          }
          EOF
          echo "module.exports = {};" > ../wira-sdk/index.js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests - Reusable components
        run: pnpm test -- --testPathPattern=__tests__/unit/components

      - name: Run tests - General configuration
        run: pnpm test -- --testPathPattern="__tests__/unit/(api|config)"

      - name: Run tests - Hooks
        run: pnpm test -- --testPathPattern=__tests__/unit/hooks

      - name: Run tests - Navigation
        run: pnpm test -- --testPathPattern=__tests__/unit/navigation

      - name: Run tests - Redux slices
        run: pnpm test -- --testPathPattern=__tests__/unit/redux

      - name: Run tests - Services and utils
        run: pnpm test -- --testPathPattern="__tests__/unit/(services|utils)"

      - name: Run Module tests - Login
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/Auth/(Login|LoginUser|AccountLock|OTPCode).test.js"

      - name: Run Module tests - Register
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/Auth/(ConditionsRegister|RegisterUser[^\/]*).test.js"

      - name: Run Module tests - Logout
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/TabBar/Home/HomeScreen.Basic.test.js"

      - name: Run Module tests - Recovery File
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/Auth/(SelectRecuperation|RecoveryQR|RecoveryFinalize|RecoveryUser[^\/]*).test.js"

      - name: Run Module tests - Recovery Guardians (unused module)
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/Auth/(FindMyUser|.*Guardian.*|).test.js"

      - name: Run Module tests - Guardians (unused module)
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/TabBar/Guardians"

      - name: Run Module tests - Recovery CI/Selfie
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/Auth/RegisterUser(2|4).test.js"

      - name: Run Module tests - Device token/push
        run: pnpm test -- --testPathPattern="__tests__/unit/notifications.test.js"

      - name: Run Module tests - Home
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/TabBar/Home/(HomeScreen[^\/]*).test.js"

      - name: Run Module tests - Notifications
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/TabBar/Home/(Notification[^\/]*).test.js"

      - name: Run Module tests - Details/WebView
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/(TableDetailScreen|UnifiedTableScreen).test"

      - name: Run Module tests - Electoral Locations
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/ElectoralLocationsScreen.test"

      - name: Run Module tests - Records/Worksheet
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/RecordReviewScreen.test"

      - name: Run Module tests - Witness
        run: pnpm test -- --testPathPattern="__tests__/unit/containers/(SearchTable|(Camera|PhotoConfirmation|PhotoReview|WitnessRecord)Screen).test"

      - name: Run Module tests - Offline Queue
        run: pnpm test -- --testPathPattern="__tests__/unit/utils/.*offlineQueue.*.test.js"

      - name: Run Module tests - Institutional voting
        run: pnpm test -- --testPathPattern="__tests__/unit/features/voting/(CandidateCard|ElectionCard|ElectionRepository|quequeAdapter).test.js"

      - name: Run Module tests - Participations/Receipts
        run: pnpm test -- --testPathPattern="__tests__/unit/features/voting/(ParticipationListScreen|PublicElectionWebViewScreen|Notification.*|VoteReceiptScreen).test.js"

      - name: Run Module tests - Institutional voting with QR
        run: pnpm test -- --testPathPattern="__tests__/unit/features/voting/CandidateScreen.test.js"

      - name: Run Module tests - Health
        run: pnpm test -- --testPathPattern="__tests__/unit/AppRoot.test.js"
